name: Refresh Ubersuggest Token

on:
  schedule:
    # Runs at 5:50 AM UTC daily — 10 minutes before the Supabase sync cron (6:00 AM UTC)
    - cron: "50 5 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Save Ubersuggest session to Supabase
        env:
          UBERSUGGEST_TOKEN: ${{ secrets.UBERSUGGEST_TOKEN }}
          UBERSUGGEST_SESSION: ${{ secrets.UBERSUGGEST_SESSION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refresh-ubersuggest-token.js

      - name: Report success
        if: success()
        run: echo "✅ Ubersuggest session saved to Supabase at $(date -u)"

      - name: Report failure
        if: failure()
        run: echo "❌ Failed — UBERSUGGEST_COOKIE may be expired. Update it in GitHub Secrets."
