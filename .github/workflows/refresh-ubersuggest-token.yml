name: Refresh Ubersuggest Token

on:
  schedule:
    # Runs at 5:50 AM UTC daily — 10 minutes before the Supabase sync cron (6:00 AM UTC)
    - cron: "50 5 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright and Chromium
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run token refresh script
        env:
          UBERSUGGEST_EMAIL: ${{ secrets.UBERSUGGEST_EMAIL }}
          UBERSUGGEST_PASSWORD: ${{ secrets.UBERSUGGEST_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/refresh-ubersuggest-token.js

      - name: Report success
        if: success()
        run: echo "✅ Ubersuggest token refreshed successfully at $(date -u)"

      - name: Report failure
        if: failure()
        run: echo "❌ Ubersuggest token refresh failed — check logs above"
